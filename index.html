<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styel.css">
    <link rel="stylesheet" href="pages/signUp.html">
    <link rel="stylesheet" href="pages/home.html">

</head>
<body>
    <div class="container">
        <div class="row d-flex justify-content-center align-items-center flex-column">
            <div class="col-md-9">
                <div class="text-center login shadow-lg mt-5 p-5">
                    <h2>Smart Login System</h2>
                    <input type="email" class="form-control" id="email" placeholder="Enter Your Email">
                    <input type="password" class="form-control" id="password" placeholder="Enter Your Password">
                    <p id="alertMessage" class="d-none text-success"></p>
                    <button type="submit" id="Button">Login</button>
                    <p class="text-white fw-bold">Don’t have an account? <a href="pages/signUp.html">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/signin.js"></script>
</body>
</html>
